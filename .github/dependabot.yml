# Dependabot config for db-analyzer-postgres
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # ── npm (pnpm) dependencies from package.json ────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Chisinau"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      dev-tools:
        patterns:
          - "@biomejs/*"
          - "@types/*"
          - "ts-node"
          - "typescript"
        update-types:
          - "minor"
          - "patch"
      runtime-minor-patch:
        patterns:
          - "@inquirer/*"
          - "pg"
        update-types:
          - "minor"
          - "patch"

  # ── GitHub Actions ───────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Chisinau"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
